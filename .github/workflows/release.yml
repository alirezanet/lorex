name: Release

on:
  push:
    tags:
      - 'v*'

# Needed to create the GitHub release and upload assets
permissions:
  contents: write

jobs:
  # ── Run tests before building anything ──────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Build & Test
        run: |
          dotnet restore
          dotnet build --no-restore --configuration Release
          dotnet test --no-build --configuration Release --verbosity normal

  # ── Build native AOT binaries for each platform ─────────────────────────────
  build:
    name: Build (${{ matrix.rid }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            binary: Lorex.exe
            artifact: lorex-win-x64.exe

          - os: windows-latest
            rid: win-arm64
            binary: Lorex.exe
            artifact: lorex-win-arm64.exe

          - os: ubuntu-latest
            rid: linux-x64
            binary: Lorex
            artifact: lorex-linux-x64

          - os: ubuntu-24.04-arm
            rid: linux-arm64
            binary: Lorex
            artifact: lorex-linux-arm64

          - os: macos-latest
            rid: osx-x64
            binary: Lorex
            artifact: lorex-osx-x64

          - os: macos-latest
            rid: osx-arm64
            binary: Lorex
            artifact: lorex-osx-arm64

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Extract version from tag
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish
        run: >
          dotnet publish src/Lorex
          /p:PublishProfile=${{ matrix.rid }}
          /p:Version=${{ steps.ver.outputs.version }}
          -c Release

      - name: Stage binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "src/Lorex/bin/Release/net10.0/${{ matrix.rid }}/publish/${{ matrix.binary }}" "${{ matrix.artifact }}"

      - name: Stage binary (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          cp "src/Lorex/bin/Release/net10.0/${{ matrix.rid }}/publish/${{ matrix.binary }}" "${{ matrix.artifact }}"
          chmod +x "${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  # ── Build NuGet package (dotnet tool, requires runtime) ──────────────────────
  package:
    name: Build NuGet package
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Extract version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Pack
        run: >
          dotnet pack src/Lorex
          /p:Version=${{ steps.ver.outputs.version }}
          /p:PublishAot=false
          -c Release
          -o ./nupkg-out

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lorex-nupkg
          path: nupkg-out/*.nupkg
          if-no-files-found: error

      - name: Push to NuGet
        run: dotnet nuget push nupkg-out/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

  # ── Create GitHub release and attach all assets ──────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build, package]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Create release (draft)
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: true
          generate_release_notes: true
          files: |
            artifacts/lorex-win-x64.exe
            artifacts/lorex-win-arm64.exe
            artifacts/lorex-linux-x64
            artifacts/lorex-linux-arm64
            artifacts/lorex-osx-x64
            artifacts/lorex-osx-arm64
            artifacts/*.nupkg
